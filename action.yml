name: 'Unique Hello World Python Action'
description: 'A simple action that prints Hello World using Python'
author: 'Arcesio Arias'
branding:
  icon: 'terminal'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Run Python script
      run: python ${{ github.action_path }}/hello.py
      shell: bash
